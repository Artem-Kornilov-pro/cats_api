version: '3.8'

services:
  cat-api:
    build: .
    container_name: cat-randomizer-api
    ports:
      - "8090:8000"  # Изменили с 8000 на 8090
    volumes:
      - ./app:/app/app
      - cat_images:/app/app/static
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

volumes:
  cat_images: